server {
    server_name canton-indexer.web34ever.com;

    access_log /var/log/nginx/indexer-access.log;
    error_log  /var/log/nginx/indexer-error.log;

    # mainnet — default
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # testnet
    location /testnet/ {
        rewrite ^/testnet/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # devnet
    location /devnet/ {
        rewrite ^/devnet/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/canton-indexer.web34ever.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/canton-indexer.web34ever.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = canton-indexer.web34ever.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name canton-indexer.web34ever.com;
    return 404;
}
